[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/product.html"
  function = "legacy-seo-redirect"

[[edge_functions]]
  path = "/shop.html"
  function = "legacy-seo-redirect"

[[redirects]]
  from = "http://parapharmacie.me/*"
  to = "https://parapharmacie.me/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.parapharmacie.me/*"
  to = "https://parapharmacie.me/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.parapharmacie.me/*"
  to = "https://parapharmacie.me/:splat"
  status = 301
  force = true

# Keep browser API requests same-origin. Netlify proxies the public path to
# Render; Docker/Nginx proxies the same path to the Compose backend.
[[redirects]]
  from = "/api/v1/*"
  to = "https://startagain.onrender.com/api/v1/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/cart.html"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

