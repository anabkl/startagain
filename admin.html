<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | Parashop Tawfiq</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="index.html"><img src="assets/images/logo-head.png" alt="Parashop Tawfiq"></a>
      <p class="sidebar__title">لوحة التحكم</p>
    </div>
    <nav class="sidebar__nav">
      <a href="#" class="active" data-tab="products"><i class="fas fa-plus-circle"></i> إضافة منتج</a>
      <a href="#" data-tab="packs"><i class="fas fa-box-open"></i> إضافة باك/بانر</a>
      <a href="#" data-tab="manage-products"><i class="fas fa-list-check"></i> إدارة المنتجات</a>
      <a href="orders.html"><i class="fas fa-list-alt"></i> الطلبات</a>
    </nav>
    <div class="sidebar__logout">
      <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content" id="pageContent" style="display:none;">
    <h1><i class="fas fa-tachometer-alt"></i> لوحة التحكم</h1>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="products">إضافة منتج عادي</button>
      <button class="tab-btn" data-tab="packs">إضافة باك / بانر</button>
      <button class="tab-btn" data-tab="manage-products">إدارة المنتجات</button>
    </div>

    <!-- Tab: Add Product -->
    <div class="tab-panel active" id="tab-products">
      <div class="admin-card">
        <h2>إضافة منتج عادي</h2>
        <form id="productForm">
          <div class="form-group">
            <label>اسم المنتج</label>
            <input type="text" name="name" placeholder="مثال: كريم مرطب للبشرة" required />
          </div>
          <div class="form-group">
            <label>صورة المنتج</label>
            <input type="file" name="image" accept="image/*" required />
          </div>
          <div class="form-group">
            <label>الوصف</label>
            <textarea name="description" placeholder="وصف مختصر للمنتج..." required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>السعر العادي (DH)</label>
              <input type="number" name="price" step="0.01" min="0" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label>السعر الترويجي (DH) — اختياري</label>
              <input type="number" name="promoPrice" step="0.01" min="0" placeholder="0.00" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>التصنيف (Category)</label>
              <select name="category" required>
                <option value="visage">Visage</option>
                <option value="corps">Corps</option>
                <option value="cheveux">Cheveux</option>
                <option value="bebe-maman">Bébé & Maman</option>
                <option value="solaire">Solaire</option>
                <option value="hygiene">Hygiène</option>
                <option value="sante">Santé</option>
                <option value="supplements">Compléments alimentaires</option>
                <option value="homme">Homme</option>
                <option value="bio">Bio</option>
                <option value="paramedical">Para-médical</option>
                <option value="promotions">Promotions</option>
              </select>
            </div>
            <div class="form-group">
              <label>الماركة</label>
              <input type="text" name="brand" placeholder="مثال: Bioderma" required />
            </div>
          </div>
          <button type="submit" class="btn-submit"><i class="fas fa-save"></i> حفظ المنتج</button>
          <p id="productStatus" class="status-msg"></p>
        </form>
      </div>
    </div>

    <!-- Tab: Add Pack/Banner -->
    <div class="tab-panel" id="tab-packs">
      <div class="admin-card">
        <h2>إضافة باك / بانر ترويجي</h2>
        <form id="packForm">
          <div class="form-group">
            <label>عنوان الباك / البانر</label>
            <input type="text" name="name" placeholder="مثال: عرض الصيف — باك عناية كاملة" required />
          </div>
          <div class="form-group">
            <label>صورة الباك</label>
            <input type="file" name="image" accept="image/*" required />
          </div>
          <div class="form-group">
            <label>الوصف</label>
            <textarea name="description" placeholder="وصف العرض أو محتويات الباك..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>السعر الترويجي (DH)</label>
              <input type="number" name="promoPrice" step="0.01" min="0" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label>نوع البانر</label>
              <select name="packType">
                <option value="عرض خاص">🔥 عرض خاص</option>
                <option value="باك ترويجي">📦 باك ترويجي</option>
              </select>
            </div>
          </div>
          <div class="form-group" id="endTimeGroup">
            <label>تاريخ ووقت انتهاء العرض (Flash Sale ⏱️)</label>
            <input type="datetime-local" name="endTime" id="endTimeInput" />
            <small style="color: #757575;">خوي هاد الخانة يلا ما بغيتيش العرض يسالي.</small>
          </div>

          <button type="submit" class="btn-submit"><i class="fas fa-save"></i> حفظ الباك / البانر</button>
          <p id="packStatus" class="status-msg"></p>
        </form>
      </div>
    </div>

    <div class="tab-panel" id="tab-manage-products">
      <div class="admin-card admin-card--wide">
        <div class="admin-card__header">
          <div>
            <h2>إدارة المنتجات</h2>
            <p class="admin-muted">تعديل سريع للكتالوغ المحلي: إخفاء، تفعيل، تغيير السعر، الحالة والوصف.</p>
          </div>
          <span class="admin-mode" id="adminBackendMode">Local</span>
        </div>

        <div class="product-admin-toolbar">
          <input type="search" id="adminProductSearch" placeholder="بحث بالاسم، الماركة، التصنيف..." aria-label="بحث في المنتجات">
          <button class="tab-btn" type="button" id="resetProductOverrides">إعادة المنتجات المخفية</button>
        </div>

        <div class="admin-products-list" id="adminProductsList"></div>

        <form class="admin-product-editor" id="adminProductEditor" hidden>
          <h3>تعديل المنتج</h3>
          <input type="hidden" id="editProductId">
          <div class="form-row">
            <div class="form-group">
              <label>اسم المنتج</label>
              <input type="text" id="editName" required>
            </div>
            <div class="form-group">
              <label>الماركة</label>
              <input type="text" id="editBrand" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>السعر الحالي (DH)</label>
              <input type="number" id="editPrice" step="0.01" min="0" required>
            </div>
            <div class="form-group">
              <label>السعر القديم (اختياري)</label>
              <input type="number" id="editOldPrice" step="0.01" min="0">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>التصنيف</label>
              <select id="editCategory"></select>
            </div>
            <div class="form-group">
              <label>حالة المخزون</label>
              <select id="editStockStatus">
                <option value="En stock">En stock</option>
                <option value="Stock limite">Stock limite</option>
                <option value="Rupture de stock">Rupture de stock</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>مسار الصورة / رابط الصورة</label>
            <input type="text" id="editImage" placeholder="assets/products/...webp">
          </div>
          <div class="form-group">
            <label>الوصف</label>
            <textarea id="editDescription" required></textarea>
          </div>
          <label class="admin-checkbox">
            <input type="checkbox" id="editActive">
            <span>المنتج ظاهر في المتجر</span>
          </label>
          <div class="admin-editor-actions">
            <button type="submit" class="btn-submit"><i class="fas fa-save"></i> حفظ التعديلات</button>
            <button type="button" class="tab-btn" id="cancelProductEdit">إلغاء</button>
          </div>
          <p id="productEditStatus" class="status-msg"></p>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="js/admin-dashboard.js"></script>
</body>
</html>
