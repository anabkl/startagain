limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

upstream backend_upstream {
    server backend:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Permit a narrowly scoped ACME challenge path if the deployment uses
    # webroot validation; all other dotfiles remain denied below.
    location ^~ /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Defense in depth: these paths are absent from dist, but must remain
    # unreachable even if a future mount is misconfigured.
    location ~* ^/(?:backend|docker|scripts|node_modules|\.git|\.github)(?:/|$) {
        return 404;
    }

    location ~* ^/(?:docker-compose(?:\.dev)?\.ya?ml|package(?:-lock)?\.json|Dockerfile|Makefile|firestore\.rules|storage\.rules|setup-admin\.html|seed(?:-products)?\.html)$ {
        return 404;
    }

    location ^~ /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Only content-addressed files are safe to cache immutably. The current
    # storefront deliberately ships mutable /js/*.js and /css/*.css names.
    location ~* ^/.+\.[0-9a-f]{8,}\.(?:css|js|mjs|svg|png|jpg|jpeg|webp|gif|ico|woff2?)$ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs)$ {
        expires off;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri =404;
    }

    location ~* \.(?:svg|png|jpg|jpeg|webp|gif|ico|woff2?)$ {
        expires off;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location = /index.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
