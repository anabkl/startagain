<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Parashop Tawfiq</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .login-container { max-width: 400px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .login-container img { height: 60px; margin-bottom: 20px; }
        .form-control { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 1rem; }
        .btn-full { width: 100%; padding: 12px; background: #0d7c3e; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-full:hover { background: #1a9e52; }
        .btn-full:disabled { background: #ccc; cursor: not-allowed; }
        #login-status { margin-top: 15px; font-weight: bold; min-height: 20px; }
        .status-error { color: #e74c3c; }
        .status-success { color: #0d7c3e; }
    </style>
</head>
<body style="background: #f5f5f5;">

    <div class="login-container">
        <a href="index.html"><img src="assets/images/logo-head.png" alt="Logo"></a>
        <h2 style="margin-bottom: 10px; color: #212121;">مرحباً بك مجدداً</h2>
        <p style="color: #757575; margin-bottom: 30px;">قم بتسجيل الدخول لمتابعة طلباتك</p>

        <form id="clientLoginForm">
            <input type="email" id="clientEmail" class="form-control" placeholder="البريد الإلكتروني" required>
            <input type="password" id="clientPassword" class="form-control" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-full" id="loginBtn">تسجيل الدخول</button>
        </form>
        <p id="login-status"></p>
        <p style="margin-top: 20px; font-size: 0.9rem;">ليس لديك حساب؟ <a href="register.html" style="color: #0d7c3e; font-weight: bold;">إنشاء حساب جديد</a></p>
    </div>

    <script type="module">
        import { loginUser } from './js/auth.js';

        const form = document.getElementById('clientLoginForm');
        const statusEl = document.getElementById('login-status');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('clientEmail').value.trim();
            const password = document.getElementById('clientPassword').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'جاري تسجيل الدخول...';
            statusEl.textContent = '';
            statusEl.className = '';

            try {
                const data = await loginUser(email, password, { suppressRedirect: true });
                statusEl.textContent = 'تم تسجيل الدخول بنجاح! 👋';
                statusEl.className = 'status-success';
                setTimeout(() => {
                    window.location.href = data?.user?.role === 'admin' ? 'admin.html' : 'index.html';
                }, 700);
            } catch (error) {
                statusEl.textContent = error.message || 'خطأ غير معروف';
                statusEl.className = 'status-error';
                loginBtn.disabled = false;
                loginBtn.textContent = 'تسجيل الدخول';
            }
        });
    </script>
    <a href="https://wa.me/212675698351" target="_blank" aria-label="واتساب" style="background:#25D366; position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:35px; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:1000; transition:0.3s; text-decoration:none;"><i class="fab fa-whatsapp"></i></a>
</body>
</html>
