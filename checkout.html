<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | Parashop Tawfiq</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Cairo', sans-serif; }
        .checkout-container { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin: 40px auto; align-items: flex-start; }
        
        /* --- Left Side: Form --- */
        .checkout-card { background: #fff; padding: 35px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #edf2f0; }
        .checkout-card h2 { font-size: 1.5rem; color: #212121; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .checkout-card h2 i { color: #1a9e52; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / span 2; }
        
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #616161; font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 14px; border: 1.5px solid #ebebeb; border-radius: 12px; background: #fafafa; transition: 0.3s; font-family: inherit; }
        .input-group input:focus, .input-group textarea:focus { border-color: #1a9e52; background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(26, 158, 82, 0.1); }

        /* --- Payment Options --- */
        .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .payment-method { border: 2px solid #f0f0f0; border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s; text-align: center; position: relative; }
        .payment-method input { position: absolute; opacity: 0; }
        .payment-method i { font-size: 1.5rem; margin-bottom: 10px; display: block; color: #9e9e9e; }
        .payment-method span { font-weight: 700; color: #616161; font-size: 0.9rem; }
        .payment-method.active { border-color: #1a9e52; background: #f0f9f4; }
        .payment-method.active i, .payment-method.active span { color: #1a9e52; }

        /* --- Right Side: Summary --- */
        .order-summary { background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 15px 50px rgba(13, 124, 62, 0.06); border: 1px solid #e8f0eb; position: sticky; top: 100px; }
        .order-summary h3 { font-size: 1.2rem; margin-bottom: 20px; color: #212121; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; color: #757575; font-size: 0.95rem; }
        .summary-total { border-top: 2px dashed #f0f0f0; padding-top: 20px; margin-top: 20px; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.4rem; color: #0d7c3e; }

        .btn-confirm { width: 100%; background: #1a9e52; color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 25px; transition: 0.3s; box-shadow: 0 10px 20px rgba(26, 158, 82, 0.2); }
        .btn-confirm:hover { background: #0d7c3e; transform: translateY(-3px); }

        @media (max-width: 992px) { .checkout-container { grid-template-columns: 1fr; } .order-summary { position: static; } .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: auto; } }
    </style>
</head>
<body>

    <header class="header__main" style="background: #fff; padding: 15px 0; border-bottom: 1px solid #eee;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html"><img src="assets/images/logo-head.png" alt="Logo" style="height: 50px;"></a>
            <a href="cart.html" style="color: #616161; font-weight: bold; text-decoration: none;"><i class="fas fa-arrow-right"></i> العودة للسلة</a>
        </div>
    </header>

    <main class="container">
        <div class="checkout-container">
            
            <div class="checkout-card">
                <h2><i class="fas fa-map-marker-alt"></i> معلومات التوصيل</h2>
                <form id="checkout-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label>الاسم الشخصي *</label>
                            <input type="text" id="firstName" placeholder="أدخل اسمك" required>
                        </div>
                        <div class="input-group">
                            <label>الاسم العائلي *</label>
                            <input type="text" id="lastName" placeholder="أدخل نسبك" required>
                        </div>
                        <div class="input-group full-width">
                            <label>البريد الإلكتروني (اختياري)</label>
                            <input type="email" id="email" placeholder="email@example.com">
                        </div>
                        <div class="input-group full-width">
                            <label>رقم الواتساب (للتواصل بخصوص الطلب) *</label>
                            <input type="tel" id="whatsapp" placeholder="06 XX XX XX XX" required>
                        </div>
                        <div class="input-group">
                            <label>المدينة *</label>
                            <input type="text" id="city" placeholder="مثلاً: خريبكة" required>
                        </div>
                        <div class="input-group">
                            <label>العنوان الكامل *</label>
                            <input type="text" id="address" placeholder="الحي، رقم المنزل..." required>
                        </div>
                    </div>

                    <h2 style="margin-top: 40px;"><i class="fas fa-credit-card"></i> طريقة الدفع</h2>
                    <div class="payment-methods">
                        <div class="payment-method active" onclick="selectPayment('COD', this)">
                            <input type="radio" name="paymentMethod" value="COD" checked>
                            <i class="fas fa-hand-holding-usd"></i>
                            <span>الدفع عند الاستلام</span>
                        </div>
                        <div class="payment-method" onclick="selectPayment('STRIPE', this)">
                            <input type="radio" name="paymentMethod" value="STRIPE">
                            <i class="fas fa-shield-check"></i>
                            <span>بطاقة بنكية (آمن)</span>
                        </div>
                    </div>
                </form>
            </div>

            <aside class="order-summary">
                <h3>ملخص الطلب</h3>
                <div id="summary-items-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                    </div>
                <div class="summary-item">
                    <span>التوصيل:</span>
                    <span style="color: #1a9e52; font-weight: bold;">مجاني</span>
                </div>
                <div class="summary-total">
                    <span>الإجمالي:</span>
                    <span id="order-total-amount">0.00 DH</span>
                </div>
                <button type="submit" form="checkout-form" class="btn-confirm">تأكيد الطلب الآن</button>
                <p style="text-align: center; font-size: 0.8rem; color: #9e9e9e; margin-top: 15px;">
                    <i class="fas fa-lock"></i> تشفير آمن لبياناتك الشخصية
                </p>
            </aside>

        </div>
    </main>

    <script>
        function selectPayment(val, el) {
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            el.querySelector('input').checked = true;
        }
    </script>
    <script type="module" src="js/checkout.js"></script>
    <!-- WhatsApp Float -->
    <a href="https://wa.me/212675698351" target="_blank" aria-label="واتساب" style="background:#25D366; position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:35px; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:1000; transition:0.3s; text-decoration:none;"><i class="fab fa-whatsapp"></i></a>
</body>
</html>
