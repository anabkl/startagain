<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إعداد حساب المدير — استخدم مرة واحدة فقط</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 6px 30px rgba(0,0,0,0.1); padding: 40px; max-width: 480px; width: 100%; text-align: center; }
    .card h1 { color: #0d7c3e; font-size: 1.5rem; margin-bottom: 8px; }
    .card p.subtitle { color: #757575; font-size: 0.9rem; margin-bottom: 30px; }
    .warning { background: #fff8e1; border: 1px solid #ffe082; color: #795548; padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 25px; text-align: right; line-height: 1.6; }
    .btn { background: #0d7c3e; color: #fff; border: none; padding: 14px 30px; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Cairo', sans-serif; transition: background 0.2s; }
    .btn:hover { background: #1a9e52; }
    .btn:disabled { background: #9e9e9e; cursor: not-allowed; }
    #status { margin-top: 20px; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; display: none; }
    #status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    #status.error   { background: #ffebee; color: #c62828; display: block; }
    #status.info    { background: #e3f2fd; color: #1565c0; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚙️ إعداد حساب المدير</h1>
    <p class="subtitle">Parashop Tawfiq — استخدم هذه الصفحة مرة واحدة فقط ثم احذفها</p>

    <div class="warning">
      ⚠️ <strong>تحذير:</strong> هذه الصفحة تنشئ حساب المدير في Firebase Auth وتضيف وثيقة <code>users/{uid}</code> بدور <code>admin</code>.<br>
      احذف هذا الملف بعد الاستخدام لأسباب أمنية.
    </div>

    <button class="btn" id="setupBtn">إنشاء حساب المدير</button>
    <div id="status"></div>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase.js';
    import {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import {
      doc,
      setDoc,
      serverTimestamp,
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const ADMIN_EMAIL    = 'lhraouianas16@gmail.com';
    const ADMIN_PASSWORD = 'Anas@123';

    const btn      = document.getElementById('setupBtn');
    const statusEl = document.getElementById('status');

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      showStatus('جارٍ إنشاء الحساب...', 'info');

      try {
        let user;

        // محاولة إنشاء الحساب، وإذا كان موجوداً نحاول تسجيل الدخول
        try {
          const cred = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
          user = cred.user;
          showStatus('تم إنشاء حساب Firebase Auth ✅ جارٍ إضافة دور المدير...', 'info');
        } catch (authErr) {
          if (authErr.code === 'auth/email-already-in-use') {
            showStatus('الحساب موجود مسبقاً، جارٍ تسجيل الدخول لتحديث الدور...', 'info');
            const cred = await signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
            user = cred.user;
          } else {
            throw authErr;
          }
        }

        // إضافة / تحديث وثيقة المستخدم في Firestore بدور admin
        await setDoc(doc(db, 'users', user.uid), {
          uid:       user.uid,
          email:     ADMIN_EMAIL,
          name:      'Anas Lhraoui',
          role:      'admin',
          createdAt: serverTimestamp(),
        }, { merge: true });

        showStatus(`✅ تم بنجاح! حساب المدير جاهز.\nالبريد: ${ADMIN_EMAIL}\nUID: ${user.uid}\n\nاحذف هذا الملف الآن!`, 'success');
      } catch (err) {
        console.error(err);
        showStatus(`❌ خطأ: ${err.message}`, 'error');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
