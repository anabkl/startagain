version: '3.9'

services:
  mongo:
    image: mongo:7.0-jammy
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: /home/runner/work/startagain/startagain/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - /home/runner/work/startagain/startagain/backend/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: parapharmacie
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://127.0.0.1
      FLASK_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - '5000'

  celery_worker:
    build:
      context: /home/runner/work/startagain/startagain/backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "celery_worker.celery_app", "worker", "--loglevel=INFO"]
    restart: unless-stopped
    env_file:
      - /home/runner/work/startagain/startagain/backend/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: parapharmacie
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongo
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    volumes:
      - /home/runner/work/startagain/startagain:/usr/share/nginx/html:ro
      - /home/runner/work/startagain/startagain/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/runner/work/startagain/startagain/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
  redis_data:
