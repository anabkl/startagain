services:
  mongo:
    image: mongo:7.0-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - '5000'

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "celery_worker.celery_app", "worker", "--loglevel=INFO"]
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_worker.celery_app inspect ping --destination celery@$${HOSTNAME} --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      - mongo
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    volumes:
      # Run `npm run build` before starting Compose so Nginx serves only
      # the generated public artifact, never repository or secret files.
      - ./dist:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
  redis_data:
