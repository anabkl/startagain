<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح | Parashop Tawfiq</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <main class="container" style="text-align: center; padding: 4rem 1rem;">
        <div class="success-page">
            <i class="fas fa-check-circle success-page__icon"></i>
            <h1 class="success-page__title">تم الدفع بنجاح! 🎉</h1>
            <p class="success-page__text">شكراً لك! تم استلام دفعتك بنجاح وسيتم تجهيز طلبك في أقرب وقت.</p>
            <p class="success-page__order-id">رقم الطلب: <strong id="order-id-display">-</strong></p>
            <div class="success-page__actions">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> العودة للرئيسية</a>
                <a href="shop.html" class="btn btn-secondary"><i class="fas fa-store"></i> متابعة التسوق</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { updateCartCount } from './js/main.js';

        // تفريغ السلة بعد الدفع الناجح
        localStorage.removeItem('parashop_cart');
        updateCartCount();

        // عرض رقم الطلب
        const params  = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');
        if (orderId) {
            document.getElementById('order-id-display').textContent = orderId;
        }
    </script>
</body>
</html>
