<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطلبات | parapharmacie.me Tawfiq</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f5f8f7; }
        .admin-shell { padding: 24px 0 56px; }
        .admin-nav { background: #fff; border-bottom: 1px solid var(--line); box-shadow: var(--shadow-sm); }
        .admin-nav__inner { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
        .admin-nav__brand { display: flex; align-items: center; gap: 12px; }
        .admin-nav__brand img { width: 46px; height: 46px; object-fit: contain; }
        .admin-nav__brand h1 { margin: 0; color: var(--green-900); font-size: 1.22rem; }
        .admin-nav__brand p { margin: 0; color: var(--muted); font-size: 0.86rem; }
        .orders-toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) 220px auto; gap: 12px; margin: 20px 0; }
        .orders-toolbar input,
        .orders-toolbar select,
        .status-select { width: 100%; min-height: 44px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); padding: 9px 12px; }
        .orders-table-card { overflow: hidden; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
        .orders-table-wrap { overflow-x: auto; }
        .orders-table { width: 100%; min-width: 980px; border-collapse: collapse; text-align: right; }
        .orders-table th,
        .orders-table td { padding: 14px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
        .orders-table th { color: var(--muted); font-size: 0.82rem; font-weight: 900; white-space: nowrap; }
        .orders-table strong { color: var(--ink); }
        .order-id { direction: ltr; display: inline-flex; color: var(--green-900); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-weight: 900; }
        .status-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 92px; padding: 6px 10px; border-radius: var(--pill); font-size: 0.8rem; font-weight: 900; }
        .status--pending { background: #fff7d6; color: #9a6a07; }
        .status--confirmed { background: #e8f5ff; color: #266c9f; }
        .status--preparing { background: #f2ecff; color: #6b3fb5; }
        .status--delivery { background: #eaf7f1; color: #0f7f64; }
        .status--delivered { background: #e6f7e8; color: #167344; }
        .status--cancelled { background: #fff1f1; color: #d94343; }
        .orders-actions { display: flex; flex-wrap: wrap; gap: 6px; }
        .orders-actions button,
        .orders-actions a { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); padding: 6px 9px; cursor: pointer; font-size: 0.8rem; font-weight: 900; }
        .orders-actions a { color: #128c7e; }
        .orders-actions .danger { color: var(--danger); background: #fff8f8; }
        .orders-actions .success { color: var(--green-700); background: var(--surface-soft); }
        .orders-empty { padding: 34px; text-align: center; color: var(--muted); }
        .modal-backdrop { position: fixed; inset: 0; z-index: 120; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(20, 33, 61, 0.42); }
        .modal-backdrop.open { display: flex; }
        .order-modal { width: min(780px, 100%); max-height: min(760px, 92vh); overflow: auto; border-radius: var(--radius); background: #fff; box-shadow: var(--shadow-md); }
        .order-modal__header { position: sticky; top: 0; z-index: 2; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--line); background: #fff; }
        .order-modal__header h2 { margin: 0; color: var(--green-900); font-size: 1.18rem; }
        .order-modal__body { display: grid; gap: 18px; padding: 20px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .detail-card { padding: 12px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface-soft); }
        .detail-card span { display: block; color: var(--muted); font-size: 0.78rem; font-weight: 900; }
        .detail-card strong { display: block; color: var(--ink); }
        .order-products { display: grid; gap: 8px; }
        .order-product { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
        .status-history { display: grid; gap: 8px; padding: 0; margin: 0; list-style: none; }
        .status-history li { display: flex; justify-content: space-between; gap: 12px; padding: 9px 10px; border-radius: var(--radius); background: var(--surface-soft); }
        @media (max-width: 760px) {
            .admin-nav__inner,
            .orders-toolbar { grid-template-columns: 1fr; align-items: stretch; }
            .admin-nav__inner { flex-direction: column; padding: 14px 0; }
            .detail-grid { grid-template-columns: 1fr; }
            .orders-table th,
            .orders-table td { padding: 11px 10px; }
        }
    </style>
</head>
<body>
    <nav class="admin-nav">
        <div class="container admin-nav__inner">
            <div class="admin-nav__brand">
                <img src="assets/images/logo-head.png" alt="parapharmacie.me">
                <div>
                    <h1>لوحة الطلبات</h1>
                    <p>Gestion commandes Tawfiq / COD / WhatsApp optionnel</p>
                </div>
            </div>
            <div class="orders-actions">
                <a href="admin.html"><i class="fa-solid fa-box"></i> إدارة المنتجات</a>
                <a href="index.html"><i class="fa-solid fa-store"></i> المتجر</a>
            </div>
        </div>
    </nav>

    <main class="container admin-shell">
        <section class="orders-toolbar" aria-label="تصفية الطلبات">
            <input type="search" id="orders-search" placeholder="بحث برقم الطلب، الزبون، المدينة..." aria-label="بحث في الطلبات">
            <select id="orders-status-filter" aria-label="تصفية حسب الحالة">
                <option value="all">كل الحالات</option>
            </select>
            <button class="btn btn--secondary" type="button" id="orders-refresh">
                <i class="fa-solid fa-rotate"></i>
                تحديث
            </button>
        </section>

        <section class="orders-table-card">
            <div class="orders-table-wrap">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>الزبون</th>
                            <th>المدينة</th>
                            <th>المجموع</th>
                            <th>طريقة الدفع</th>
                            <th>الحالة</th>
                            <th>إدارة</th>
                            <th>التواصل</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
            <div class="orders-empty" id="orders-empty" hidden>لا توجد طلبات مطابقة.</div>
        </section>
    </main>

    <div class="modal-backdrop" id="order-modal" role="dialog" aria-modal="true" aria-labelledby="order-modal-title">
        <article class="order-modal">
            <header class="order-modal__header">
                <h2 id="order-modal-title">تفاصيل الطلب</h2>
                <button class="btn-remove" type="button" id="order-modal-close" aria-label="إغلاق"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div class="order-modal__body" id="order-modal-body"></div>
        </article>
    </div>

    <script type="module" src="js/orders.js"></script>
</body>
</html>
